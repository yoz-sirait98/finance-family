    <!-- SPA route restore script for GitHub Pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '=' ) {
          var q = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          })
          if (q[0] === 'p=') {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q[1] ? '/' + q[1] : '') +
              (q[2] ? '?' + q[2] : '') +
              l.hash
            );
          }
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
