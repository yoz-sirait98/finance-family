services:
  - type: web
    name: finance-family-api
    env: docker
    region: singapore
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: "Family Finance"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: "https://yjsfinance.my.id"
      - key: APP_TIMEZONE
        value: "Asia/Jakarta"
      - key: LOG_CHANNEL
        value: errorlog
      - key: DB_CONNECTION
        value: pgsql
      # Supabase connection credentials — please fill these in manually in the Render Dashboard
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: "postgres"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: "require"
      - key: SESSION_DRIVER
        value: "database"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: "lax"
      - key: CACHE_STORE
        value: "database"
      - key: QUEUE_CONNECTION
        value: "database"
      - key: FRONTEND_URL
        value: "https://yjsfinance.web.id"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://yjsfinance.web.id"
